<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>智能排班助手 V4.6</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  
  <style>
    :root {
      --primary: #4f46e5;
      --body-bg: #f3f4f6;
      --card-bg: #ffffff;
      --text-main: #1f2937;
      --text-sub: #6b7280;
      --duty-bg: #fee2e2;
      --duty-text: #dc2626;
      --rest-bg: #e0f2fe;
      --rest-text: #0284c7;
      --border: #e5e7eb;
      --input-bg: #f9fafb;
      --success: #10b981;
    }

    [data-theme="dark"] {
      --body-bg: #111827;
      --card-bg: #1f2937;
      --text-main: #f9fafb;
      --text-sub: #9ca3af;
      --duty-bg: #450a0a;
      --duty-text: #fecaca;
      --rest-bg: #082f49;
      --rest-text: #bae6fd;
      --border: #374151;
      --input-bg: #111827;
    }

    body { font-family: -apple-system, sans-serif; background: var(--body-bg); margin: 0; padding: 15px; color: var(--text-main); transition: background 0.3s; -webkit-tap-highlight-color: transparent; }
    .container { max-width: 600px; margin: 0 auto; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .month-picker { display: flex; align-items: center; gap: 12px; background: var(--card-bg); padding: 6px 16px; border-radius: 14px; border: 1px solid var(--border); }
    .nav-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--primary); padding: 4px; }

    .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
    .btn { padding: 12px 2px; border: none; border-radius: 12px; font-size: 0.75rem; font-weight: 600; cursor: pointer; background: var(--primary); color: #fff; transition: all 0.1s; text-align: center; }
    .btn:active { transform: scale(0.94); opacity: 0.9; }
    .btn-secondary { background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); }

    .conflict-panel { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border); display: none; }
    .conflict-title { font-weight: 800; font-size: 0.85rem; margin-bottom: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .conflict-item { font-size: 0.75rem; padding: 8px; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid; display: flex; justify-content: space-between; align-items: center;}
    .c-tag { font-size: 0.55rem; padding: 2px 5px; border-radius: 4px; font-weight: bold; }

    .person-card { background: var(--card-bg); border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden; transition: all 0.3s ease; }
    .person-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .name-box { display: flex; align-items: center; gap: 8px; }
    .edit-icon { font-size: 0.8rem; opacity: 0.5; padding: 4px; cursor: pointer; }
    .stats-tags span { font-size: 0.65rem; margin-right: 5px; background: var(--body-bg); padding: 2px 6px; border-radius: 6px; }

    .calendar-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .person-card.open .calendar-content { max-height: 1200px; }

    table { width: 100%; border-collapse: separate; border-spacing: 4px; padding: 0 15px 15px; }
    th { font-size: 0.65rem; color: var(--text-sub); padding-bottom: 8px; }
    td { height: 46px; text-align: center; border-radius: 12px; background: var(--input-bg); font-weight: 700; border: 1px solid var(--border); font-size: 0.95rem; position: relative; }
    
    .is-today-cell { outline: 2.5px solid var(--primary); z-index: 1; }
    .is-duty { background: var(--duty-bg) !important; color: var(--duty-text) !important; border-color: var(--duty-text) !important; }
    .is-rest { background: var(--rest-bg) !important; color: var(--rest-text) !important; border-color: var(--rest-text) !important; }
    .tag { display: block; font-size: 0.55rem; font-weight: normal; margin-top: 2px; }

    .card-footer { padding: 14px 20px; background: var(--input-bg); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .footer-btn { font-size: 0.78rem; color: var(--primary); cursor: pointer; font-weight: 600; padding: 4px 8px; }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-content { background: var(--card-bg); width: 85%; max-width: 320px; padding: 25px; border-radius: 28px; }
    input { width: 100%; padding: 14px; margin: 18px 0; border: 1px solid var(--border); border-radius: 12px; background: var(--input-bg); color: var(--text-main); font-size: 1rem; box-sizing: border-box; outline: none; }
    #fileInput { display: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="month-picker">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <b id="monthTitle">...</b>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>
    <button id="themeToggle" style="background:none; border:none; font-size:1.4rem; cursor:pointer;">🌗</button>
  </div>

  <div class="btn-group">
    <button class="btn" onclick="openModal()">＋人员</button>
    <button class="btn" onclick="shareAsImage()" style="background:var(--success)">🔗直接分享</button>
    <button class="btn btn-secondary" onclick="exportData()">📤导出</button>
    <button class="btn btn-secondary" onclick="triggerImport()">📥导入</button>
  </div>

  <input type="file" id="fileInput" accept=".json" onchange="importData(event)">

  <div id="captureArea">
    <div id="conflictPanel" class="conflict-panel">
      <div class="conflict-title"><span>⏰ 待处理预警</span><span id="todayLabel" style="color:var(--primary); font-size:0.7rem;"></span></div>
      <div id="conflictList"></div>
    </div>
    <div id="mainList"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 style="margin:0; text-align:center;">添加成员</h3>
    <input type="text" id="pName" placeholder="姓名" maxlength="10">
    <div style="display:flex; gap:12px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">取消</button>
      <button class="btn" style="flex:1" id="addBtn">确定</button>
    </div>
  </div>
</div>

<script>
  let viewDate = new Date();
  let people = [];

  const getGlobalListKey = () => `duty_global_names`;
  const getStorageKey = (y, m) => `duty_v4_${y || viewDate.getFullYear()}_${m || (viewDate.getMonth() + 1)}`;

  function loadData() {
      const data = localStorage.getItem(getStorageKey());
      const globalNames = JSON.parse(localStorage.getItem(getGlobalListKey()) || "[]");
      if (data) {
          people = JSON.parse(data);
          globalNames.forEach(name => { if(!people.find(p => p.name === name)) people.push({ name, duty: [], rest: [], _open: true }); });
          people = people.filter(p => globalNames.includes(p.name));
      } else {
          people = globalNames.map(name => ({ name, duty: [], rest: [], _open: true }));
      }
      render();
  }

  function changeMonth(offset) { viewDate.setMonth(viewDate.getMonth() + offset); loadData(); }

  function render() {
      const year = viewDate.getFullYear(), month = viewDate.getMonth() + 1;
      const daysInMonth = new Date(year, month, 0).getDate();
      document.getElementById('monthTitle').innerText = `${year}年${month}月`;
      const now = new Date();
      const isCurrentMonth = (now.getMonth() === viewDate.getMonth() && now.getFullYear() === viewDate.getFullYear());
      const todayDay = isCurrentMonth ? now.getDate() : -1;
      document.getElementById('todayLabel').innerText = isCurrentMonth ? `今日: ${todayDay}日` : "";

      const list = document.getElementById('mainList');
      list.innerHTML = '';
      people.forEach((p, pIdx) => {
          const card = document.createElement('div');
          card.className = `person-card ${p._open ? 'open' : ''}`;
          card.innerHTML = `
            <div class="person-header" onclick="handleHeaderClick(event, ${pIdx})">
              <div style="flex:1">
                <div class="name-box">
                    <b style="font-size:1.1rem; border-bottom:1.5px dashed var(--primary)">${p.name}</b>
                    <span class="edit-icon" onclick="renamePerson(event, ${pIdx})">✏️</span>
                </div>
                <div class="stats-tags">
                  <span style="color:var(--duty-text)">值班 ${p.duty.length}</span>
                  <span style="color:var(--rest-text)">休息 ${p.rest.length}</span>
                </div>
              </div>
              <div style="font-size:0.75rem; color:var(--text-sub)">${p._open?'收起':'详情'}</div>
            </div>
            <div class="calendar-content">
              ${drawCalendar(p, pIdx, year, month, todayDay, daysInMonth)}
              <div class="card-footer">
                <span class="footer-btn" style="color:var(--success)" onclick="applyPattern(${pIdx}, ${daysInMonth})">🪄规律填充</span>
                <span class="footer-btn" style="color:#ef4444" onclick="deletePerson(${pIdx})">移除</span>
              </div>
            </div>
          `;
          list.appendChild(card);
      });
      checkConflicts(daysInMonth);
      saveAll();
  }

  function saveAll() {
      localStorage.setItem(getStorageKey(), JSON.stringify(people));
      localStorage.setItem(getGlobalListKey(), JSON.stringify(people.map(p => p.name)));
  }

  function drawCalendar(p, pIdx, year, month, todayDay, days) {
      let firstDay = new Date(year, month - 1, 1).getDay();
      let start = (firstDay === 0) ? 6 : firstDay - 1; 
      let html = '<table><tr><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th><th>日</th></tr><tr>';
      for(let i=0; i<start; i++) html += '<td></td>';
      for(let d=1; d<=days; d++) {
          if((d+start-1)%7 === 0 && d!==1) html += '</tr><tr>';
          const isD = p.duty.includes(d), isR = p.rest.includes(d);
          html += `<td class="${isD?'is-duty':(isR?'is-rest':'')} ${d===todayDay?'is-today-cell':''}" onclick="toggleDay(${pIdx},${d})">
                      ${d}<span class="tag">${isD?'值班':(isR?'休息':'')}</span>
                  </td>`;
      }
      return html + '</tr></table>';
  }

  function renamePerson(e, idx) {
      e.stopPropagation();
      const newName = prompt("名字修改：", people[idx].name);
      if (newName && newName.trim() !== "") { people[idx].name = newName.trim(); render(); }
  }

  function handleHeaderClick(e, idx) {
      if (!e.target.classList.contains('edit-icon')) { people[idx]._open = !people[idx]._open; render(); }
  }

  function toggleDay(pIdx, d) {
      const p = people[pIdx];
      if(!p.duty.includes(d) && !p.rest.includes(d)) p.duty.push(d);
      else if(p.duty.includes(d)) { p.duty = p.duty.filter(x=>x!==d); p.rest.push(d); }
      else p.rest = p.rest.filter(x=>x!==d);
      render();
  }

  function applyPattern(idx, maxDays) {
      const p = prompt("规律 (1:值班, 0:休息, .:上班)", "1..0");
      if (!p) return;
      const s = prompt(`开始日期`, "1");
      const startDay = parseInt(s);
      if (isNaN(startDay)) return;
      people[idx].duty = []; people[idx].rest = [];
      for(let i = 1; i <= maxDays; i++) {
          if (i < startDay) continue;
          const char = p[(i - startDay) % p.length];
          if(char === '1') people[idx].duty.push(i);
          else if(char === '0') people[idx].rest.push(i);
      }
      render();
  }

  function checkConflicts(daysInMonth) {
      const cList = document.getElementById('conflictList');
      cList.innerHTML = '';
      let hasAlert = false;
      const now = new Date(); now.setHours(0,0,0,0);
      for (let d = 1; d <= daysInMonth; d++) {
          if (new Date(viewDate.getFullYear(), viewDate.getMonth(), d) < now) continue;
          const onDuty = people.filter(p => p.duty.includes(d)).map(p => p.name);
          const onRest = people.filter(p => p.rest.includes(d)).map(p => p.name);
          if (onDuty.length > 1) {
              hasAlert = true;
              cList.innerHTML += `<div class="conflict-item" style="background:var(--duty-bg); color:var(--duty-text); border-color:var(--duty-text)"><span><b>${d}号</b>: ${onDuty.join(' & ')}</span><span class="c-tag" style="background:var(--duty-text); color:#fff">重复值班</span></div>`;
          }
          if (onRest.length > 1) {
              hasAlert = true;
              cList.innerHTML += `<div class="conflict-item" style="background:var(--rest-bg); color:var(--rest-text); border-color:var(--rest-text)"><span><b>${d}号</b>: ${onRest.join(' & ')}</span><span class="c-tag" style="background:var(--rest-text); color:#fff">重复休息</span></div>`;
          }
      }
      document.getElementById('conflictPanel').style.display = hasAlert ? 'block' : 'none';
  }

  function deletePerson(i) { if(confirm(`移除 [${people[i].name}]？`)) { people.splice(i, 1); render(); } }
  function openModal() { document.getElementById('modal').style.display = 'flex'; }
  function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('pName').value = ''; }
  document.getElementById('addBtn').onclick = () => {
      const name = document.getElementById('pName').value.trim();
      if(name) { people.push({name, duty:[], rest:[], _open:true}); render(); closeModal(); }
  };

  // 重点修改：直接分享图片到 APP
  async function shareAsImage() {
      const area = document.getElementById('captureArea'), original = people.map(p => p._open);
      // 1. 临时展开所有卡片
      people.forEach(p => p._open = true); render();
      
      try {
          // 2. 生成 Canvas
          const canvas = await html2canvas(area, { backgroundColor: '#ffffff', scale: 2 });
          
          // 3. 将 Canvas 转为 Blob (二进制数据)
          canvas.toBlob(async (blob) => {
              const file = new File([blob], `排班表_${viewDate.getMonth()+1}月.png`, { type: 'image/png' });
              
              // 4. 检查浏览器是否支持分享文件
              if (navigator.canShare && navigator.canShare({ files: [file] })) {
                  await navigator.share({
                      files: [file],
                      title: '排班表',
                      text: `${viewDate.getFullYear()}年${viewDate.getMonth()+1}月排班安排`
                  });
              } else {
                  // 如果不支持直接分享文件，则回退到传统下载模式
                  const a = document.createElement('a');
                  a.download = `排班表_${viewDate.getMonth()+1}月.png`;
                  a.href = canvas.toDataURL(); a.click();
                  alert("当前浏览器不支持直接分享，已自动为您保存图片。");
              }
          }, 'image/png');

      } catch (err) {
          console.error("分享失败:", err);
      } finally {
          // 5. 还原折叠状态
          people.forEach((p,i) => p._open = original[i]); render();
      }
  }

  function exportData() {
    const backup = { v: "4.6", data: people, date: { y: viewDate.getFullYear(), m: viewDate.getMonth()+1 } };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(backup)], {type: "application/json"}));
    a.download = `备份.json`; a.click();
  }

  function triggerImport() { document.getElementById('fileInput').click(); }
  function importData(e) {
      const reader = new FileReader();
      reader.onload = (ev) => {
          try {
              const imported = JSON.parse(ev.target.result);
              people = imported.data || imported; render();
          } catch (err) { alert("导入失败"); }
      };
      reader.readAsText(e.target.files[0]);
  }

  const themeToggle = document.getElementById('themeToggle');
  themeToggle.onclick = () => {
    const isDark = document.documentElement.toggleAttribute('data-theme');
    localStorage.setItem('duty_theme_v4', isDark ? 'dark' : 'light');
  };
  if(localStorage.getItem('duty_theme_v4') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

  window.onload = loadData;
</script>
</body>
</html>
