<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="排班助手">
  <meta name="theme-color" id="themeColor" content="#4f46e5">
  
  <link rel="manifest" href='data:application/manifest+json,{"name":"智能排班助手","short_name":"排班助手","start_url":".","display":"standalone","background_color":"#f3f4f6","theme_color":"#4f46e5","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2370/2370264.png","sizes":"512x512","type":"image/png"}]}'>

  <title>智能排班助手</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  
  <style>
    :root {
      --primary: #4f46e5; --body-bg: #f3f4f6; --card-bg: #ffffff;
      --text-main: #1f2937; --text-sub: #6b7280; --duty-bg: #fee2e2;
      --duty-text: #dc2626; --rest-bg: #e0f2fe; --rest-text: #0284c7;
      --border: #e5e7eb; --input-bg: #f9fafb; --success: #10b981;
    }

    [data-theme="dark"] {
      --body-bg: #111827; --card-bg: #1f2937; --text-main: #f9fafb;
      --text-sub: #9ca3af; --duty-bg: #7f1d1d; --duty-text: #fecaca;
      --rest-bg: #0c4a6e; --rest-text: #bae6fd; --border: #374151; --input-bg: #111827;
    }

    body { font-family: -apple-system, sans-serif; background: var(--body-bg); margin: 0; padding: 15px; color: var(--text-main); transition: background 0.3s; -webkit-tap-highlight-color: transparent; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
    .btn { padding: 12px 2px; border: none; border-radius: 12px; font-size: 0.75rem; font-weight: 600; cursor: pointer; background: var(--primary); color: #fff; }
    .btn-secondary { background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border); }
    .btn-share { background: var(--success); }

    .person-card { background: var(--card-bg); border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden; }
    .person-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    .calendar-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
    .person-card.open .calendar-content { max-height: 1000px; }

    table { width: 100%; border-collapse: separate; border-spacing: 4px; padding: 10px 15px 20px 15px; }
    td { height: 48px; text-align: center; border-radius: 12px; background: var(--input-bg); font-weight: 700; border: 1px solid var(--border); position: relative; }
    .is-duty { background: var(--duty-bg) !important; color: var(--duty-text) !important; border-color: var(--duty-text) !important; }
    .is-rest { background: var(--rest-bg) !important; color: var(--rest-text) !important; border-color: var(--rest-text) !important; }
    .is-today-cell { outline: 2px solid var(--primary); }
    .conflict-panel { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border); display: none; }
    
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
    .modal-content { background: var(--card-bg); width: 85%; max-width: 320px; padding: 25px; border-radius: 24px; }
    input { width: 100%; padding: 14px; margin: 18px 0; border: 1px solid var(--border); border-radius: 12px; background: var(--input-bg); color: var(--text-main); }
  </style>
</head>
<body>

<div class="container" id="mainContainer">
  <div class="header">
    <h2 id="monthTitle">智能排班助手</h2>
    <button id="themeToggle" style="background:none; border:none; font-size:1.4rem;">🌗</button>
  </div>

  <div class="btn-group">
    <button class="btn" onclick="openModal('add')">＋人员</button>
    <button class="btn btn-share" onclick="shareAsImage()">📸分享</button>
    <button class="btn btn-secondary" onclick="exportData()">📤导出</button>
    <button class="btn btn-secondary" onclick="triggerImport()">📥导入</button>
  </div>

  <input type="file" id="fileInput" accept=".json" onchange="importData(event)" style="display:none">

  <div id="captureArea">
    <div id="conflictPanel" class="conflict-panel">
      <div id="conflictList"></div>
    </div>
    <div id="mainList"></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle" style="margin:0; text-align:center;"></h3>
    <input type="text" id="pName" placeholder="请输入姓名" maxlength="10">
    <div style="display:flex; gap:10px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">取消</button>
      <button class="btn" style="flex:1" id="modalConfirmBtn">确定</button>
    </div>
  </div>
</div>

<script>
  // 注册 Service Worker 离线缓存 (空运行以触发 Chrome 安装提示)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      const swCode = `self.addEventListener('fetch', (event) => { event.respondWith(fetch(event.request)); });`;
      const blob = new Blob([swCode], { type: 'text/javascript' });
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url);
    });
  }

  const todayDate = new Date();
  const currentYear = todayDate.getFullYear();
  const currentMonth = todayDate.getMonth() + 1;
  const todayDay = todayDate.getDate();
  const STORAGE_KEY = 'duty_v25_pwa';

  document.getElementById('monthTitle').innerText = `${currentYear}年${currentMonth}月`;

  let people = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let editingIdx = null;

  function render() {
    const list = document.getElementById('mainList');
    list.innerHTML = '';
    people.forEach((p, pIdx) => {
      const card = document.createElement('div');
      card.className = `person-card ${p._open ? 'open' : ''}`;
      card.innerHTML = `
        <div class="person-header" onclick="toggleFold(${pIdx})">
          <div style="flex:1">
            <b onclick="event.stopPropagation(); openEditName(${pIdx})">${p.name}</b>
            <div style="font-size:0.7rem; color:var(--text-sub)">值班:${p.duty.length} 休息:${p.rest.length}</div>
          </div>
          <div>${p._open?'▼':'▶'}</div>
        </div>
        <div class="calendar-content">
          ${drawCalendar(p, pIdx)}
          <div style="padding:10px 20px; text-align:right">
            <span style="font-size:0.7rem; color:#ef4444" onclick="deletePerson(${pIdx})">删除人员</span>
          </div>
        </div>
      `;
      list.appendChild(card);
    });
    checkConflicts();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(people));
  }

  function drawCalendar(p, pIdx) {
    const days = new Date(currentYear, currentMonth, 0).getDate();
    const start = (new Date(currentYear, currentMonth - 1, 1).getDay() || 7) - 1;
    let html = '<table><tr><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th><th>日</th></tr><tr>';
    for(let i=0; i<start; i++) html += '<td></td>';
    for(let d=1; d<=days; d++) {
      if((d+start-1)%7 === 0 && d!==1) html += '</tr><tr>';
      const isD = p.duty.includes(d), isR = p.rest.includes(d);
      html += `<td class="${isD?'is-duty':(isR?'is-rest':'')} ${d===todayDay?'is-today-cell':''}" onclick="toggleDay(${pIdx},${d})">${d}</td>`;
    }
    return html + '</tr></table>';
  }

  function checkConflicts() {
    const dutyMap = {};
    people.forEach(p => p.duty.forEach(d => (dutyMap[d] = dutyMap[d] || []).push(p.name)));
    const cList = document.getElementById('conflictList');
    cList.innerHTML = '';
    let found = false;
    Object.keys(dutyMap).forEach(d => {
      if(dutyMap[d].length > 1 && d >= todayDay) {
        found = true;
        cList.innerHTML += `<div style="font-size:0.8rem; padding:8px; color:var(--duty-text)">${d}日: ${dutyMap[d].join(' & ')} 重复值班</div>`;
      }
    });
    document.getElementById('conflictPanel').style.display = found ? 'block' : 'none';
  }

  function toggleDay(pIdx, d) {
    const p = people[pIdx];
    if(p.duty.includes(d)) { p.duty = p.duty.filter(x=>x!==d); p.rest.push(d); }
    else if(p.rest.includes(d)) { p.rest = p.rest.filter(x=>x!==d); }
    else { p.duty.push(d); }
    render();
  }

  function toggleFold(i) { people[i]._open = !people[i]._open; render(); }
  function openModal(mode) { document.getElementById('modal').style.display = 'flex'; document.getElementById('modalConfirmBtn').onclick = mode==='add'?addPerson:saveName; }
  function closeModal() { document.getElementById('modal').style.display = 'none'; }
  function addPerson() { const name = document.getElementById('pName').value; if(name){people.push({name, duty:[], rest:[], _open:true}); render(); closeModal();} }
  function deletePerson(idx) { if(confirm('删除？')){people.splice(idx,1); render();} }
  
  async function shareAsImage() {
    const area = document.getElementById('captureArea');
    people.forEach(p => p._open = true); render();
    setTimeout(async () => {
      const canvas = await html2canvas(area, { backgroundColor: '#f3f4f6', scale: 2 });
      canvas.toBlob(async (blob) => {
        const file = new File([blob], '排班.png', { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: '排班表' });
        } else {
          const link = document.createElement('a'); link.download = '排班.png'; link.href = canvas.toDataURL(); link.click();
        }
      });
      render();
    }, 400);
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(people)], {type: "application/json"});
    const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "排班备份.json"; link.click();
  }
  function triggerImport() { document.getElementById('fileInput').click(); }
  function importData(e) {
    const reader = new FileReader();
    reader.onload = (ev) => { people = JSON.parse(ev.target.result); render(); };
    reader.readAsText(e.target.files[0]);
  }

  window.onload = render;
</script>
</body>
</html>
